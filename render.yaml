services:
  - type: web
    name: caselens-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: starter          # 512MB → 2GB RAM, needed for torch + transformers
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 10000
    disk:
      name: caselens-data
      mountPath: /opt/render/project/src/rag/sessions
      sizeGB: 1