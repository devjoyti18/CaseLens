<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-button active" id="chatbot-tab">Chatbot</button>
            <button class="tab-button" id="upload-tab">Document Upload</button>
        </div>
        <div class="tab-content" id="chatbot-content">
            <div class="chat-window" id="chat-window"></div>
            <div class="chat-controls">
                <input type="text" id="chat-input" placeholder="Type your message...">
                <button id="send-btn" onclick="sendQuery()">Send</button>
            </div>
            
            <div id="chat-response"></div>
            <div class="chat-actions">
                <button id="download-chat">Download Chat</button>
                <button id="clear-chat">Clear Chat</button>
            </div>
        </div>
        <div class="tab-content hidden" id="upload-content">
            <form id="upload-form">
                <label for="file-upload" class="upload-label">Choose a document to upload:</label>
                <input type="file" id="file-upload" name="file-upload" accept=".pdf,.doc,.docx,.txt">
                <button type="submit">Upload</button>
            </form>
            <div id="upload-status"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
